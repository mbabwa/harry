baseurl = "https://mbabwa.com/"
theme = "hc-starter"
languageCode = "en-gb"
title = "mbabwa"
pluralizelisttitles = false
# Enable for syntax highlighting
pygmentsUseClasses = true
# Enable highlighting for code fences
pygmentsCodeFences = true
# Get LastMod data from Git
enableGitInfo = true

# Enable Emojis
enableEmoji = true

[params]
keywords = "Information Design, Strategy, Organizational Strategy, Systemic Design"
description = "Michael Babwahsingh is an information designer trying to make sense of the world."
strapline = "Human skills for deep change"
location = ""
card_image = ""
# Set Cloudinary URL for image hosting
cloudinary_url = ""

[params.author]
name = "Michael Babwahsingh"
email = "mbabwa@proton.me"
github = ""
linkedin = "https://linkedin.com/in/mbabwahsingh/"

[taxonomies]
topic = "topics"

[outputs]
home = ["HTML", "RSS"]

[outputFormats]
[outputFormats.RSS]
mediatype = "application/rss"
baseName = "feed"

[permalinks]
writing = "/:section/:slug/"
projects = "/:section/:slug/"
updates = "/:section/:slug/"
page = "/:slug/"

[markup]
[markup.goldmark]
duplicateResourceFiles = false
[markup.goldmark.extensions]
definitionList = true
footnote = true
linkify = true
linkifyProtocol = 'https'
strikethrough = true
table = true
taskList = true
[markup.goldmark.extensions.extras]
[markup.goldmark.extensions.extras.insert]
enable = false
[markup.goldmark.extensions.extras.mark]
enable = true
[markup.goldmark.extensions.extras.subscript]
enable = false
[markup.goldmark.extensions.extras.superscript]
enable = false
[markup.goldmark.extensions.passthrough]
enable = false
[markup.goldmark.parser]
wrapStandAloneImageWithinParagraph = false # remove paragraphs that wrap stand-alone images https://discourse.gohugo.io/t/remove-empty-p-s-from-content/42462/7?u=harrycresswell

